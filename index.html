<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>SEC - Dashboard Supervisor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header-sec">

  <img
    src="assets/logo-rebesa.jpg"
    alt="Rebesa"
    class="logo-rebesa"
  >

  <div>
    <h1>SEC - Alertas</h1>
    <p>Sistema de Ejecución Comercial</p>
  </div>

</header>



<nav>
  <a href="index.html">Dashboard</a>
  <a href="mapa.html">Mapa</a>
  <a href="clientes.html">Clientes</a>
  <a href="visitas.html">Visitas</a>
  <a href="alertas.html">Alertas</a>
  <a href="pendientes.html">Pendientes</a>
  <a href="dashboard-vendedores.html">Vendedores</a>
  <a href="usuarios.html">Usuarios</a>
  <a href="login-vendedor.html">App Vendedor</a>
</nav>

<div class="container">

  <div class="cards">
    <div class="card"><h3>Usuarios</h3><p id="totalUsuarios">0</p></div>
    <div class="card"><h3>Clientes</h3><p id="totalClientes">0</p></div>
    <div class="card"><h3>Canales</h3><p id="totalCanales">0</p></div>
    <div class="card"><h3>Visitas</h3><p id="totalVisitas">0</p></div>
    <div class="card"><h3>Alertas</h3><p id="totalAlertas">0</p></div>
  </div>

  <h2>Últimas visitas</h2>
  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Vendedor</th>
        <th>Llegada</th>
        <th>Salida</th>
        <th>Permanencia</th>
      </tr>
    </thead>
    <tbody id="tablaVisitas"></tbody>
  </table>

  <h2>Alertas</h2>
  <table>
    <thead>
      <tr>
        <th>Tipo</th>
        <th>Prioridad</th>
        <th>Descripción</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="tablaAlertas"></tbody>
  </table>

</div>

<script>
  const API = "https://sec-backend-gg4j.onrender.com";

  async function cargarDashboard() {
    const usuarios = await fetch(`${API}/usuarios`).then(r => r.json());
    const clientes = await fetch(`${API}/clientes`).then(r => r.json());
    const canales = await fetch(`${API}/canales`).then(r => r.json());
    const visitas = await fetch(`${API}/visitas`).then(r => r.json());
    const alertas = await fetch(`${API}/alertas`).then(r => r.json());

    document.getElementById("totalUsuarios").textContent = usuarios.length;
    document.getElementById("totalClientes").textContent = clientes.length;
    document.getElementById("totalCanales").textContent = canales.length;
    document.getElementById("totalVisitas").textContent = visitas.length;
    document.getElementById("totalAlertas").textContent = alertas.length;

    document.getElementById("tablaVisitas").innerHTML = visitas.map(v => `
      <tr>
        <td>${v.cliente || ""}</td>
        <td>${v.vendedor || ""}</td>
        <td>${v.hora_llegada ? new Date(v.hora_llegada).toLocaleString() : ""}</td>
        <td>${v.hora_salida ? new Date(v.hora_salida).toLocaleString() : ""}</td>
        <td>${v.permanencia_segundos || 0} seg</td>
      </tr>
    `).join("");

    document.getElementById("tablaAlertas").innerHTML = alertas.map(a => `
      <tr>
        <td>${a.tipo || ""}</td>
        <td>${a.prioridad || ""}</td>
        <td>${a.descripcion || ""}</td>
        <td>${a.fecha_hora || ""}</td>
      </tr>
    `).join("");
  }

  cargarDashboard();
  setInterval(cargarDashboard, 30000);
</script>

</body>
</html>
