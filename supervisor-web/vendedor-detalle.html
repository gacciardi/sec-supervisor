<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SEC - Detalle Vendedor</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >

  <style>
    #mapaVendedor {
      height: 450px;
      width: 100%;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .sin-datos {
      text-align: center;
      color: #6b7280;
      padding: 18px;
    }
  </style>
</head>

<body>

<header class="header-sec">
  <img
    src="assets/logo-rebesa.jpg"
    alt="Rebesa"
    class="logo-rebesa"
  >

  <div>
    <h1>Detalle del Vendedor</h1>
    <p>Seguimiento individual</p>
  </div>
</header>

<nav>
  <a href="dashboard-vendedores.html">
    ← Volver
  </a>
</nav>

<div class="container">

  <h2 id="nombreVendedor">
    Cargando...
  </h2>

  <div class="card">
    <h3>Última posición GPS</h3>
    <div id="gps">
      Cargando GPS...
    </div>
  </div>

  <div class="card">
    <h3>Mapa del vendedor</h3>

    <p>
      🔵 Recorrido / última posición |
      🟠 Pendientes |
      🟢 Visitados
    </p>

    <div id="mapaVendedor"></div>
  </div>

  <div class="card">
    <h3>Pendientes de hoy</h3>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Cliente</th>
          <th>Canal</th>
          <th>Frecuencia</th>
        </tr>
      </thead>

      <tbody id="tablaPendientes"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>Visitas de hoy</h3>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Llegada</th>
          <th>Salida</th>
          <th>Permanencia total</th>
        </tr>
      </thead>

      <tbody id="tablaVisitas"></tbody>
    </table>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API =
  "https://sec-backend-gg4j.onrender.com";

const params =
  new URLSearchParams(
    window.location.search
  );

const vendedorId =
  params.get("id");

let mapaVendedor = null;
let capaMapa = null;

/*
Solo permite ajustar el mapa una vez,
al abrir la pantalla por primera vez.
*/
let vistaInicialMapaAjustada = false;

function coordenadaValida(lat, lng) {
  return (
    Number.isFinite(lat) &&
    Number.isFinite(lng) &&
    lat !== 0 &&
    lng !== 0 &&
    lat > -40 &&
    lat < -30 &&
    lng > -65 &&
    lng < -55
  );
}

function escaparHtml(valor) {
  return String(valor ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatoPermanencia(segundos) {
  const total =
    Number(segundos || 0);

  const minutos =
    Math.round(total / 60);

  if (minutos < 1) {
    return "Menos de 1 min";
  }

  if (minutos < 60) {
    return `${minutos} min`;
  }

  const horas =
    Math.floor(minutos / 60);

  const minutosRestantes =
    minutos % 60;

  return (
    `${horas} h ` +
    `${minutosRestantes} min`
  );
}

function agruparVisitas(visitas) {
  const agrupadas = {};

  visitas.forEach(visita => {
    const clave =
      visita.cliente_id ||
      visita.codigo_cliente ||
      visita.cliente ||
      "sin_id";

    if (!agrupadas[clave]) {
      agrupadas[clave] = {
        cliente_id:
          visita.cliente_id,

        codigo_cliente:
          visita.codigo_cliente,

        cliente:
          visita.cliente,

        direccion:
          visita.direccion,

        localidad:
          visita.localidad,

        hora_llegada:
          visita.hora_llegada,

        hora_salida:
          visita.hora_salida,

        permanencia_segundos:
          0,

        latitud_llegada:
          visita.latitud_llegada,

        longitud_llegada:
          visita.longitud_llegada
      };
    }

    agrupadas[clave]
      .permanencia_segundos +=
        Number(
          visita.permanencia_segundos || 0
        );

    if (
      visita.hora_llegada &&
      (
        !agrupadas[clave].hora_llegada ||
        new Date(
          visita.hora_llegada
        ) <
        new Date(
          agrupadas[clave].hora_llegada
        )
      )
    ) {
      agrupadas[clave].hora_llegada =
        visita.hora_llegada;
    }

    if (
      visita.hora_salida &&
      (
        !agrupadas[clave].hora_salida ||
        new Date(
          visita.hora_salida
        ) >
        new Date(
          agrupadas[clave].hora_salida
        )
      )
    ) {
      agrupadas[clave].hora_salida =
        visita.hora_salida;
    }

    if (
      !agrupadas[clave].latitud_llegada &&
      visita.latitud_llegada
    ) {
      agrupadas[clave].latitud_llegada =
        visita.latitud_llegada;
    }

    if (
      !agrupadas[clave].longitud_llegada &&
      visita.longitud_llegada
    ) {
      agrupadas[clave].longitud_llegada =
        visita.longitud_llegada;
    }
  });

  return Object.values(agrupadas);
}

async function cargarDetalle() {
  if (!vendedorId) {
    document.getElementById(
      "nombreVendedor"
    ).textContent =
      "Falta ID del vendedor";

    return;
  }

  try {
    const [
      respuestaDetalle,
      respuestaRecorrido
    ] = await Promise.all([
      fetch(
        `${API}/dashboard/vendedores/${vendedorId}`
      ),

      fetch(
        `${API}/gps-logs/vendedor/${vendedorId}/hoy`
      )
    ]);

    const datos =
      await respuestaDetalle.json();

    const recorrido =
      await respuestaRecorrido.json();

    if (!respuestaDetalle.ok) {
      throw new Error(
        datos.error ||
        datos.detalle ||
        "No se pudo obtener el detalle"
      );
    }

    if (!respuestaRecorrido.ok) {
      throw new Error(
        recorrido.error ||
        recorrido.detalle ||
        "No se pudo obtener el recorrido"
      );
    }

    if (!datos.vendedor) {
      document.getElementById(
        "nombreVendedor"
      ).textContent =
        "Vendedor no encontrado";

      return;
    }

    const visitasAgrupadas =
      agruparVisitas(
        datos.visitas || []
      );

    document.getElementById(
      "nombreVendedor"
    ).textContent =
      `${datos.vendedor.nombre || ""} ` +
      `${datos.vendedor.apellido || ""} - ` +
      `Legajo ${datos.vendedor.legajo || ""}`;

    if (datos.ultimo_gps) {
      document.getElementById(
        "gps"
      ).innerHTML = `
        Latitud:
        ${escaparHtml(
          datos.ultimo_gps.latitud
        )}
        <br>

        Longitud:
        ${escaparHtml(
          datos.ultimo_gps.longitud
        )}
        <br>

        Fecha:
        ${
          datos.ultimo_gps.fecha_hora
            ? new Date(
                datos.ultimo_gps.fecha_hora
              ).toLocaleString(
                "es-AR"
              )
            : ""
        }
      `;
    } else {
      document.getElementById(
        "gps"
      ).innerHTML =
        "Sin posición registrada";
    }

    renderizarPendientes(
      datos.pendientes || []
    );

    renderizarVisitas(
      visitasAgrupadas
    );

    dibujarMapa(
      datos,
      Array.isArray(recorrido)
        ? recorrido
        : [],
      visitasAgrupadas
    );

  } catch (error) {
    console.error(
      "Error cargando detalle:",
      error
    );

    document.getElementById(
      "gps"
    ).textContent =
      `Error: ${error.message}`;
  }
}

function renderizarPendientes(pendientes) {
  const tabla =
    document.getElementById(
      "tablaPendientes"
    );

  if (pendientes.length === 0) {
    tabla.innerHTML = `
      <tr>
        <td
          colspan="4"
          class="sin-datos"
        >
          No hay clientes pendientes.
        </td>
      </tr>
    `;

    return;
  }

  tabla.innerHTML =
    pendientes
      .map(cliente => `
        <tr>
          <td>
            ${escaparHtml(
              cliente.codigo_cliente
            )}
          </td>

          <td>
            ${escaparHtml(
              cliente.nombre
            )}
          </td>

          <td>
            ${escaparHtml(
              cliente.canal
            )}
          </td>

          <td>
            ${escaparHtml(
              cliente.frecuencia
            )}
          </td>
        </tr>
      `)
      .join("");
}

function renderizarVisitas(visitas) {
  const tabla =
    document.getElementById(
      "tablaVisitas"
    );

  if (visitas.length === 0) {
    tabla.innerHTML = `
      <tr>
        <td
          colspan="4"
          class="sin-datos"
        >
          Todavía no hay visitas registradas.
        </td>
      </tr>
    `;

    return;
  }

  tabla.innerHTML =
    visitas
      .map(visita => `
        <tr>
          <td>
            ${escaparHtml(
              visita.cliente
            )}
          </td>

          <td>
            ${
              visita.hora_llegada
                ? new Date(
                    visita.hora_llegada
                  ).toLocaleString(
                    "es-AR"
                  )
                : ""
            }
          </td>

          <td>
            ${
              visita.hora_salida
                ? new Date(
                    visita.hora_salida
                  ).toLocaleString(
                    "es-AR"
                  )
                : "En curso"
            }
          </td>

          <td>
            ${formatoPermanencia(
              visita.permanencia_segundos
            )}
          </td>
        </tr>
      `)
      .join("");
}

function iniciarMapa() {
  if (mapaVendedor) {
    return;
  }

  mapaVendedor =
    L.map(
      "mapaVendedor",
      {
        zoomControl: true
      }
    ).setView(
      [-34.7073, -58.6757],
      13
    );

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom: 19
    }
  ).addTo(mapaVendedor);

  capaMapa =
    L.layerGroup()
      .addTo(mapaVendedor);
}

function dibujarMapa(
  datos,
  recorrido,
  visitasAgrupadas
) {
  iniciarMapa();

  capaMapa.clearLayers();

  const puntosMapa = [];

  const puntosRecorrido =
    recorrido
      .map(punto => [
        Number(punto.latitud),
        Number(punto.longitud)
      ])
      .filter(punto =>
        coordenadaValida(
          punto[0],
          punto[1]
        )
      );

  if (puntosRecorrido.length > 1) {
    L.polyline(
      puntosRecorrido,
      {
        color: "blue",
        weight: 5,
        opacity: 0.75
      }
    )
      .addTo(capaMapa)
      .bindPopup(
        "Recorrido del día"
      );

    puntosMapa.push(
      ...puntosRecorrido
    );
  }

  if (datos.ultimo_gps) {
    const lat =
      Number(
        datos.ultimo_gps.latitud
      );

    const lng =
      Number(
        datos.ultimo_gps.longitud
      );

    if (
      coordenadaValida(
        lat,
        lng
      )
    ) {
      puntosMapa.push(
        [lat, lng]
      );

      L.circleMarker(
        [lat, lng],
        {
          radius: 16,
          color: "blue",
          fillColor: "blue",
          fillOpacity: 1
        }
      )
        .addTo(capaMapa)
        .bindPopup(`
          <b>
            ${escaparHtml(
              datos.vendedor.nombre
            )}
            ${escaparHtml(
              datos.vendedor.apellido
            )}
          </b>
          <br>
          Última posición GPS
        `);
    }
  }

  (datos.pendientes || [])
    .forEach(cliente => {
      const lat =
        Number(cliente.latitud);

      const lng =
        Number(cliente.longitud);

      if (
        !coordenadaValida(
          lat,
          lng
        )
      ) {
        return;
      }

      puntosMapa.push(
        [lat, lng]
      );

      L.circleMarker(
        [lat, lng],
        {
          radius: 10,
          color: "orange",
          fillColor: "orange",
          fillOpacity: 0.9
        }
      )
        .addTo(capaMapa)
        .bindPopup(`
          <b>
            ${escaparHtml(
              cliente.nombre
            )}
          </b>
          <br>

          Código:
          ${escaparHtml(
            cliente.codigo_cliente
          )}
          <br>

          Canal:
          ${escaparHtml(
            cliente.canal
          )}
          <br>

          Frecuencia:
          ${escaparHtml(
            cliente.frecuencia
          )}
          <br>

          Estado:
          <b>PENDIENTE</b>
        `);
    });

  visitasAgrupadas
    .forEach(visita => {
      const lat =
        Number(
          visita.latitud_llegada
        );

      const lng =
        Number(
          visita.longitud_llegada
        );

      if (
        !coordenadaValida(
          lat,
          lng
        )
      ) {
        return;
      }

      puntosMapa.push(
        [lat, lng]
      );

      L.circleMarker(
        [lat, lng],
        {
          radius: 11,
          color: "green",
          fillColor: "green",
          fillOpacity: 0.95
        }
      )
        .addTo(capaMapa)
        .bindPopup(`
          <b>
            ${escaparHtml(
              visita.cliente
            )}
          </b>
          <br>

          Código:
          ${escaparHtml(
            visita.codigo_cliente
          )}
          <br>

          Llegada:
          ${
            visita.hora_llegada
              ? new Date(
                  visita.hora_llegada
                ).toLocaleString(
                  "es-AR"
                )
              : ""
          }
          <br>

          Salida:
          ${
            visita.hora_salida
              ? new Date(
                  visita.hora_salida
                ).toLocaleString(
                  "es-AR"
                )
              : "En curso"
          }
          <br>

          Permanencia total:
          ${formatoPermanencia(
            visita.permanencia_segundos
          )}
          <br>

          Estado:
          <b>VISITADO</b>
        `);
    });

  /*
  Únicamente ajusta la vista una vez.

  Las actualizaciones posteriores limpian
  y vuelven a dibujar puntos, pero nunca
  modifican el zoom ni el centro elegido
  por el supervisor.
  */

  if (!vistaInicialMapaAjustada) {
    if (puntosMapa.length > 0) {
      mapaVendedor.fitBounds(
        puntosMapa,
        {
          padding: [50, 50],
          maxZoom: 17
        }
      );
    } else {
      mapaVendedor.setView(
        [-34.7073, -58.6757],
        13
      );
    }

    vistaInicialMapaAjustada = true;
  }
}

cargarDetalle();

/*
Actualiza la información y los marcadores,
pero conserva el zoom elegido.
*/
setInterval(
  cargarDetalle,
  30000
);
</script>

</body>
</html>
