<!DOCTYPE html>
<html lang="es">
<head>

  <style>
    body {

    .topbar {

    .bottom-nav {

    .bottom-nav .principal {

    .numero-marker {

    .marker-rojo {

    }

    .leaflet-popup-content button {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: #071b3a;
      color: white;
      font-weight: bold;
      margin-top: 8px;

  </style>
</head>

<body>

<div class="topbar">

<div class="stats">

  <button

<div class="bottom-nav">

    🚪
    <span>Salí</span>
  </button>

  <button onclick="window.location.href='localizador-pro.html'">
  📍
  <span>Localizador</span>

    👤
    <span>Salir</span>
  </button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = "https://sec-backend-gg4j.onrender.com";

const vendedorId = localStorage.getItem("vendedorId");
const vendedorNombre = localStorage.getItem("vendedorNombre");

let mapa;
let capa;

let clientes = [];
let visitas = [];
let recorrido = [];

let ubicacionActual = null;
let visitaActualId = null;
let proximoCliente = null;

let clientesOmitidos = new Set();
let sugerenciaPausada = false;
let seleccionandoClienteCercano = false;

const FECHA_HOY = new Date().toISOString().slice(0, 10);

const KEY_INICIO_DIA =
  `sec_inicio_dia_${vendedorId}_${FECHA_HOY}`;

const KEY_PRIMERA_PENDIENTE =
  `sec_primera_pendiente_${vendedorId}_${FECHA_HOY}`;

const KEY_PRIMERA_DETECTADA =
  `sec_primera_detectada_${vendedorId}_${FECHA_HOY}`;

let primeraVisitaPendienteDeSalida =
  localStorage.getItem(KEY_PRIMERA_PENDIENTE) === "true";

let primeraVisitaDetectada =
  localStorage.getItem(KEY_PRIMERA_DETECTADA) === "true";

let ultimaActualizacion = 0;
let ultimaPosicionEnviada = null;
let primeraCargaMapa = true;
let enviandoGPS = false;

const COLA_OFFLINE = "sec_cola_offline_vendedor";

const MIN_METROS_ENVIO = 10;
const MIN_MS_ENTRE_ENVIO_GPS = 15000;
const MIN_MS_RECARGA_DATOS = 120000;

let ultimoEnvioGPS = 0;

if (!vendedorId) {
  window.location.href = "login-vendedor.html";
}

document.getElementById("legajoTexto").textContent =
  vendedorNombre || "Vendedor";

function coordValida(lat, lng) {
  return (
    !isNaN(lat) &&
    !isNaN(lng) &&
    lat !== 0 &&
    lng !== 0 &&
    lat > -40 &&
    lat < -30 &&
    lng > -65 &&
    lng < -55
  );
}

function distanciaMetros(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const rad = Math.PI / 180;

  const dLat = (lat2 - lat1) * rad;
  const dLon = (lon2 - lon1) * rad;

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * rad) *
      Math.cos(lat2 * rad) *
      Math.sin(dLon / 2) ** 2;

  return (
    R *
    2 *
    Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1 - a)
    )
  );
}

function inicioElegidoHoy() {
  return (
    !!localStorage.getItem(KEY_INICIO_DIA) ||
    visitas.length > 0
  );
}

function guardarEstadoPrimeraVisita() {
  localStorage.setItem(
    KEY_PRIMERA_PENDIENTE,
    String(primeraVisitaPendienteDeSalida)
  );

  localStorage.setItem(
    KEY_PRIMERA_DETECTADA,
    String(primeraVisitaDetectada)
  );
}

function activarAlgoritmoProximoCliente() {
  primeraVisitaPendienteDeSalida = false;
  primeraVisitaDetectada = false;
  sugerenciaPausada = false;

  clientesOmitidos.clear();

  guardarEstadoPrimeraVisita();
  calcularProximoCliente();
}

function pausarSugerenciasInicio() {
  sugerenciaPausada = true;

  document.getElementById(
    "proximoCliente"
  ).style.display = "none";
}

function leerColaOffline() {
  try {
    return JSON.parse(
      localStorage.getItem(COLA_OFFLINE) || "[]"
    );
  } catch {
    return [];
  }
}

function guardarColaOffline(cola) {
  localStorage.setItem(
    COLA_OFFLINE,
    JSON.stringify(cola)
  );

  actualizarEstadoConexion();
}

function agregarAColaOffline(evento) {
  const cola = leerColaOffline();

  cola.push({
    ...evento,
    fecha_local: new Date().toISOString()
  });

  guardarColaOffline(cola);
}

function actualizarEstadoConexion() {
  const cola = leerColaOffline();
  const el = document.getElementById("offlineEstado");

  if (!navigator.onLine) {
    el.textContent = `Offline (${cola.length})`;
    el.style.background = "#fee2e2";
    el.style.color = "#991b1b";
    return;
  }

  if (cola.length > 0) {
    el.textContent = `Pendiente ${cola.length}`;
    el.style.background = "#fef3c7";
    el.style.color = "#92400e";
  } else {
    el.textContent = "Online";
    el.style.background = "#e0f2fe";
    el.style.color = "#075985";
  }
}

async function enviarEvento(evento) {
  if (evento.tipo === "gps_automatico") {
    return fetch(`${API}/gps-logs/automatico`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(evento.payload)
    });
  }

  if (evento.tipo === "salida_visita") {
    return fetch(`${API}/visitas/salida`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(evento.payload)
    });
  }

  if (evento.tipo === "entrada_manual") {
    return fetch(`${API}/visitas/entrada-manual`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(evento.payload)
    });
  }

  throw new Error(
    "Tipo de evento offline no reconocido"
  );
}

async function sincronizarOffline() {
  if (!navigator.onLine) {
    actualizarEstadoConexion();
    return;
  }

  const cola = leerColaOffline();

  if (cola.length === 0) {
    actualizarEstadoConexion();
    return;
  }

  const pendientes = [];

  for (const evento of cola) {
    try {
      const respuesta = await enviarEvento(evento);

      if (!respuesta.ok) {
        pendientes.push(evento);
      }
    } catch {
      pendientes.push(evento);
    }
  }

  guardarColaOffline(pendientes);

  if (pendientes.length === 0) {
    await cargarDatos(false);
  }
}

window.addEventListener(
  "online",
  sincronizarOffline
);

window.addEventListener(
  "offline",
  actualizarEstadoConexion
);

function iniciarMapa() {
  mapa = L.map("mapa", {
    zoomControl: true
  }).setView(
    [-34.7073, -58.6757],
    14
  );

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
      maxZoom: 19
    }
  ).addTo(mapa);

  capa = L.layerGroup().addTo(mapa);
}

async function cargarDatos(ajustarMapa = false) {
  try {
    const detalle = await fetch(
      `${API}/dashboard/vendedores/${vendedorId}`
    ).then(r => r.json());

    clientes = await fetch(
      `${API}/clientes/vendedor/${vendedorId}/hoy`
    ).then(r => r.json());

    recorrido = await fetch(
      `${API}/gps-logs/vendedor/${vendedorId}/hoy`
    ).then(r => r.json());

    visitas = detalle.visitas || [];

    if (
      visitas.length > 0 &&
      !localStorage.getItem(KEY_INICIO_DIA)
    ) {
      localStorage.setItem(
        KEY_INICIO_DIA,
        "VISITAS_EXISTENTES"
      );
    }

    const debeElegirInicio =
      !inicioElegidoHoy();

    if (debeElegirInicio) {
      pausarSugerenciasInicio();
    }

    const visitadosNombres = new Set(
      visitas.map(v =>
        String(v.cliente || "").toLowerCase()
      )
    );

    const visitadosCantidad =
      clientes.filter(c =>
        visitadosNombres.has(
          String(c.nombre || "").toLowerCase()
        )
      ).length;

    document.getElementById(
      "visitados"
    ).textContent = visitadosCantidad;

    document.getElementById(
      "pendientes"
    ).textContent = Math.max(
      clientes.length - visitadosCantidad,
      0
    );

    document.getElementById(
      "total"
    ).textContent = clientes.length;

    dibujarMapa(
      visitadosNombres,
      ajustarMapa
    );

    if (debeElegirInicio) {
      mostrarSeleccionInicio();
    } else if (!seleccionandoClienteCercano) {
      calcularProximoCliente();
    }

    actualizarEstadoConexion();

  } catch (error) {
    console.error(
      "Error cargando datos:",
      error
    );

    actualizarEstadoConexion();
  }
}

async function forzarActualizar() {
  ultimaActualizacion = Date.now();

  await sincronizarOffline();
  await cargarDatos(true);
}

function crearIcono(numero, visitado) {
  return L.divIcon({
    className: "",
    html: `
      <div class="numero-marker ${
        visitado
          ? "marker-verde"
          : "marker-rojo"
      }">
        ${numero}
      </div>
    `,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
}

function dibujarMapa(
  visitadosNombres,
  ajustarMapa = false
) {
  capa.clearLayers();

  const puntos = [];

  const puntosRecorrido = recorrido
    .map(r => [
      Number(r.latitud),
      Number(r.longitud)
    ])
    .filter(p =>
      coordValida(p[0], p[1])
    );

  if (puntosRecorrido.length > 1) {
    L.polyline(
      puntosRecorrido,
      {
        color: "#0b55c7",
        weight: 5,
        opacity: 0.85
      }
    ).addTo(capa);

    puntos.push(...puntosRecorrido);
  }

  clientes.forEach((c, index) => {
    const lat = Number(c.latitud);
    const lng = Number(c.longitud);

    if (!coordValida(lat, lng)) {
      return;
    }

    const visitado =
      visitadosNombres.has(
        String(c.nombre || "").toLowerCase()
      );

    puntos.push([lat, lng]);

    L.marker(
      [lat, lng],
      {
        icon: crearIcono(
          index + 1,
          visitado
        )
      }
    )
      .addTo(capa)
      .bindPopup(`
        <b>
          ${index + 1}. ${c.nombre || ""}
        </b>
        <br>

        ${c.direccion || ""}
        <br>

        ${c.localidad || ""}
        <br>

        Estado:
        <b>
          ${
            visitado
              ? "VISITADO"
              : "PENDIENTE"
          }
        </b>
        <br>

        <button
          onclick="abrirGoogleMaps(${lat},${lng})"
        >
          NAVEGAR
        </button>
      `);
  });

  if (ubicacionActual) {
    puntos.push([
      ubicacionActual.lat,
      ubicacionActual.lng
    ]);

    L.circleMarker(
      [
        ubicacionActual.lat,
        ubicacionActual.lng
      ],
      {
        radius: 16,
        color: "#0b55c7",
        fillColor: "#0b55c7",
        fillOpacity: 1
      }
    )
      .addTo(capa)
      .bindPopup("Mi ubicación actual");
  }

  if (
    (primeraCargaMapa || ajustarMapa) &&
    puntos.length > 0
  ) {
    mapa.fitBounds(
      puntos,
      {
        padding: [45, 45],
        maxZoom: 17
      }
    );

    primeraCargaMapa = false;
  }
}

function calcularProximoCliente() {
  const panel =
    document.getElementById(
      "proximoCliente"
    );

  const texto =
    document.getElementById(
      "textoProximo"
    );

  const boton =
    document.getElementById(
      "btnNavegarProximo"
    );

  if (
    sugerenciaPausada ||
    seleccionandoClienteCercano
  ) {
    panel.style.display = "none";
    return;
  }

  if (!ubicacionActual) {
    panel.style.display = "none";
    return;
  }

  const visitados = new Set(
    visitas.map(v =>
      String(v.cliente || "").toLowerCase()
    )
  );

  let mejor = null;
  let menor = Number.POSITIVE_INFINITY;

  clientes.forEach(c => {
    if (clientesOmitidos.has(c.id)) {
      return;
    }

    if (
      visitados.has(
        String(c.nombre || "").toLowerCase()
      )
    ) {
      return;
    }

    const lat = Number(c.latitud);
    const lng = Number(c.longitud);

    if (!coordValida(lat, lng)) {
      return;
    }

    const distancia = distanciaMetros(
      ubicacionActual.lat,
      ubicacionActual.lng,
      lat,
      lng
    );

    if (distancia < menor) {
      menor = distancia;
      mejor = c;
    }
  });

  proximoCliente = mejor;

  if (!mejor) {
    panel.style.display = "none";
    return;
  }

  texto.innerHTML = `
    <b>${mejor.nombre || ""}</b>
    <br>

    ${mejor.direccion || ""}
    <br>

    ${mejor.localidad || ""}
    <br>

    A ${Math.round(menor)} metros
  `;

  boton.onclick = () =>
    abrirGoogleMaps(
      Number(mejor.latitud),
      Number(mejor.longitud)
    );

  panel.style.display = "block";
}

async function confirmarClienteCercano(
  clienteId
) {
  if (!ubicacionActual) {
    alert(
      "Todavía no tengo una ubicación GPS válida."
    );
    return;
  }

  try {
    const respuesta = await fetch(
      `${API}/gps-logs/automatico/confirmar-cliente`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          vendedor_id: vendedorId,
          cliente_id: clienteId,
          latitud: ubicacionActual.lat,
          longitud: ubicacionActual.lng
        })
      }
    );

    const datos = await respuesta.json();

    if (!respuesta.ok) {
      alert(
        datos.error ||
        datos.detalle ||
        "No se pudo confirmar el cliente"
      );
      return;
    }

    seleccionandoClienteCercano = false;

    document.getElementById(
      "panelClientesCercanos"
    ).style.display = "none";

    visitaActualId =
      datos.visita_id ||
      (datos.visita
        ? datos.visita.id
        : null);

    if (primeraVisitaPendienteDeSalida) {
      primeraVisitaDetectada = true;
      guardarEstadoPrimeraVisita();
    }

    mostrarClienteEncontrado(
      datos.cliente
    );

    document.getElementById(
      "panelVisita"
    ).style.display = "block";

    document.getElementById(
      "clienteActual"
    ).textContent =
      datos.cliente || "Cliente";

    document.getElementById(
      "direccionActual"
    ).textContent =
      "Cliente confirmado manualmente";

    document.getElementById(
      "horaLlegada"
    ).textContent =
      "Llegada: " +
      new Date().toLocaleTimeString();

    await cargarDatos(false);

  } catch (error) {
    console.error(
      "Error confirmando cliente:",
      error
    );

    alert(
      "No se pudo confirmar el cliente."
    );
  }
}
async function procesarGPS(lat, lng) {
  ubicacionActual = { lat, lng };

  document.getElementById(
    "gpsEstado"
  ).textContent = "GPS activo";

  document.getElementById(
    "gpsEstado"
  ).style.background = "#dcfce7";

  document.getElementById(
    "gpsEstado"
  ).style.color = "#166534";

  if (enviandoGPS) {
    return;
  }

  const ahora = Date.now();

  if (
    ahora - ultimoEnvioGPS <
    MIN_MS_ENTRE_ENVIO_GPS
  ) {
    calcularProximoCliente();
    return;
  }

  if (ultimaPosicionEnviada) {
    const metros = distanciaMetros(
      ultimaPosicionEnviada.lat,
      ultimaPosicionEnviada.lng,
      lat,
      lng
    );

    if (metros < MIN_METROS_ENVIO) {
      calcularProximoCliente();
      return;
    }
  }

  enviandoGPS = true;
  ultimoEnvioGPS = ahora;

  ultimaPosicionEnviada = {
    lat,
    lng
  };

  const evento = {
    tipo: "gps_automatico",
    payload: {
      vendedor_id: vendedorId,
      latitud: lat,
      longitud: lng
    }
  };

  try {
    if (!navigator.onLine) {
      throw new Error("Offline");
    }

    const respuesta =
      await enviarEvento(evento);

    const datos =
      await respuesta.json();

    if (!respuesta.ok) {
      throw new Error(
        datos.error ||
        datos.detalle ||
        "Error enviando GPS"
      );
    }

    /*
    =================================
    VARIOS CLIENTES CERCANOS
    =================================
    */

    if (
      datos.estado ===
      "MULTIPLES_CLIENTES"
    ) {
      document.getElementById(
        "panelVisita"
      ).style.display = "none";

      visitaActualId = null;

      mostrarClientesCercanos(
        datos.clientes || []
      );

      ultimaActualizacion =
        Date.now();

      enviandoGPS = false;
      return;
    }

    /*
    =================================
    DENTRO DE UN CLIENTE
    =================================
    */

    if (datos.estado === "DENTRO") {
      seleccionandoClienteCercano =
        false;

      document.getElementById(
        "panelClientesCercanos"
      ).style.display = "none";

      sugerenciaPausada = true;

      document.getElementById(
        "proximoCliente"
      ).style.display = "none";

      if (
        primeraVisitaPendienteDeSalida
      ) {
        primeraVisitaDetectada = true;
        guardarEstadoPrimeraVisita();
      }

      mostrarClienteEncontrado(
        datos.cliente
      );

      document.getElementById(
        "panelVisita"
      ).style.display = "block";

      document.getElementById(
        "clienteActual"
      ).textContent =
        datos.cliente || "Cliente";

      document.getElementById(
        "direccionActual"
      ).textContent =
        "Visita en curso";

      document.getElementById(
        "horaLlegada"
      ).textContent =
        "Llegada: " +
        new Date().toLocaleTimeString();

      visitaActualId =
        datos.visita_id ||
        (
          datos.visita
            ? datos.visita.id
            : visitaActualId
        );

      await cargarDatos(false);

      ultimaActualizacion =
        Date.now();
    }

    /*
    =================================
    SALIDA AUTOMÁTICA
    =================================
    */

    if (datos.estado === "FUERA") {
      document.getElementById(
        "panelVisita"
      ).style.display = "none";

      visitaActualId = null;

      if (
        primeraVisitaPendienteDeSalida &&
        primeraVisitaDetectada
      ) {
        activarAlgoritmoProximoCliente();
      } else {
        sugerenciaPausada = false;
        clientesOmitidos.clear();
      }

      /*
      Si al salir del cliente todavía hay otros
      comercios cercanos, los muestra para elegir.
      Se excluye el cliente que acaba de cerrar.
      */

      const clienteCerradoId =
        datos.visita
          ? datos.visita.cliente_id
          : null;

      const cercanosRestantes =
        Array.isArray(
          datos.clientes_cercanos
        )
          ? datos.clientes_cercanos.filter(
              cliente =>
                cliente.id !==
                clienteCerradoId
            )
          : [];

      if (
        cercanosRestantes.length > 0
      ) {
        mostrarClientesCercanos(
          cercanosRestantes
        );
      } else {
        seleccionandoClienteCercano =
          false;

        document.getElementById(
          "panelClientesCercanos"
        ).style.display = "none";

        calcularProximoCliente();
      }

      await cargarDatos(false);

      ultimaActualizacion =
        Date.now();
    }

  } catch (error) {
    console.error(
      "Error procesando GPS:",
      error
    );

    agregarAColaOffline(evento);

  } finally {
    enviandoGPS = false;
  }

  await sincronizarOffline();

  if (
    Date.now() - ultimaActualizacion >
    MIN_MS_RECARGA_DATOS
  ) {
    ultimaActualizacion =
      Date.now();

    await cargarDatos(false);
  }
}

function iniciarGPS() {
  if (!navigator.geolocation) {
    document.getElementById(
      "gpsEstado"
    ).textContent =
      "GPS no disponible";

    document.getElementById(
      "gpsEstado"
    ).style.background =
      "#fee2e2";

    document.getElementById(
      "gpsEstado"
    ).style.color =
      "#991b1b";

    return;
  }

  navigator.geolocation.watchPosition(
    posicion => {
      const lat =
        posicion.coords.latitude;

      const lng =
        posicion.coords.longitude;

      procesarGPS(lat, lng);
    },

    error => {
      document.getElementById(
        "gpsEstado"
      ).textContent =
        "Error GPS";

      document.getElementById(
        "gpsEstado"
      ).style.background =
        "#fee2e2";

      document.getElementById(
        "gpsEstado"
      ).style.color =
        "#991b1b";

      console.error(
        "Error de geolocalización:",
        error
      );
    },

    {
      enableHighAccuracy: true,
      maximumAge: 10000,
      timeout: 20000
    }
  );
}

async function registrarEntradaManual() {
  if (!ubicacionActual) {
    alert(
      "Todavía no tengo ubicación GPS."
    );
    return;
  }

  const confirmar = confirm(
    "¿Registrar ENTRADA manual?\n\n" +
    "Esto también actualizará la " +
    "geolocalización del cliente más cercano."
  );

  if (!confirmar) {
    return;
  }

  const evento = {
    tipo: "entrada_manual",
    payload: {
      vendedor_id: vendedorId,
      latitud: ubicacionActual.lat,
      longitud: ubicacionActual.lng
    }
  };

  try {
    if (!navigator.onLine) {
      throw new Error("Offline");
    }

    const respuesta =
      await enviarEvento(evento);

    const datos =
      await respuesta.json();

    if (!respuesta.ok) {
      alert(
        datos.error ||
        datos.detalle ||
        "No se pudo registrar la entrada manual"
      );

      return;
    }

    visitaActualId =
      datos.visita_id ||
      (
        datos.visita
          ? datos.visita.id
          : visitaActualId
      );

    if (
      primeraVisitaPendienteDeSalida
    ) {
      primeraVisitaDetectada = true;
      guardarEstadoPrimeraVisita();
    }

    sugerenciaPausada = true;

    document.getElementById(
      "proximoCliente"
    ).style.display = "none";

    mostrarClienteEncontrado(
      datos.cliente
    );

    document.getElementById(
      "panelVisita"
    ).style.display = "block";

    document.getElementById(
      "clienteActual"
    ).textContent =
      datos.cliente || "Cliente";

    document.getElementById(
      "direccionActual"
    ).textContent =
      "Entrada manual registrada";

    document.getElementById(
      "horaLlegada"
    ).textContent =
      "Llegada: " +
      new Date().toLocaleTimeString();

    await cargarDatos(false);

  } catch (error) {
    console.error(
      "Error en entrada manual:",
      error
    );

    agregarAColaOffline(evento);

    alert(
      "Sin conexión. La entrada manual " +
      "quedó guardada para sincronizar."
    );
  }
}

function empezarPorCliente(clienteId) {
  const cliente =
    clientes.find(
      c => c.id === clienteId
    );

  if (!cliente) {
    alert("Cliente no encontrado.");
    return;
  }

  const lat =
    Number(cliente.latitud);

  const lng =
    Number(cliente.longitud);

  if (!coordValida(lat, lng)) {
    alert(
      "Este cliente no tiene coordenadas " +
      "válidas para navegar."
    );

    return;
  }

  localStorage.setItem(
    KEY_INICIO_DIA,
    clienteId
  );

  primeraVisitaPendienteDeSalida =
    true;

  primeraVisitaDetectada =
    false;

  sugerenciaPausada =
    true;

  guardarEstadoPrimeraVisita();

  document.getElementById(
    "panelListado"
  ).style.display = "none";

  document.getElementById(
    "proximoCliente"
  ).style.display = "none";

  abrirGoogleMaps(lat, lng);
}

function verVisitas() {
  const lista =
    document.getElementById(
      "listaVisitas"
    );

  if (visitas.length === 0) {
    lista.innerHTML =
      "Todavía no hay visitas realizadas.";

  } else {
    const agrupadas = {};

    visitas.forEach(v => {
      const clave =
        v.cliente_id ||
        v.codigo_cliente ||
        v.cliente ||
        "sin_cliente";

      if (!agrupadas[clave]) {
        agrupadas[clave] = {
          cliente:
            v.cliente ||
            "Sin nombre",

          llegada:
            v.hora_llegada,

          salida:
            v.hora_salida,

          permanencia: 0,
          registros: 0
        };
      }

      agrupadas[clave].registros++;

      agrupadas[clave].permanencia +=
        Number(
          v.permanencia_segundos || 0
        );

      if (
        v.hora_llegada &&
        (
          !agrupadas[clave].llegada ||
          new Date(v.hora_llegada) <
          new Date(
            agrupadas[clave].llegada
          )
        )
      ) {
        agrupadas[clave].llegada =
          v.hora_llegada;
      }

      if (
        v.hora_salida &&
        (
          !agrupadas[clave].salida ||
          new Date(v.hora_salida) >
          new Date(
            agrupadas[clave].salida
          )
        )
      ) {
        agrupadas[clave].salida =
          v.hora_salida;
      }
    });

    lista.innerHTML =
      Object.values(agrupadas)
        .map(v => `
          <div class="item-panel">
            <b>
              🟢 ${v.cliente}
            </b>

            <br>

            Llegada:
            ${
              v.llegada
                ? new Date(
                    v.llegada
                  ).toLocaleTimeString()
                : "-"
            }

            <br>

            Salida:
            ${
              v.salida
                ? new Date(
                    v.salida
                  ).toLocaleTimeString()
                : "-"
            }

            <br>

            Permanencia total:
            ${
              Math.round(
                v.permanencia / 60
              )
            }
            minutos

            <br>

            Registros:
            ${v.registros}
          </div>
        `)
        .join("");
  }

  document.getElementById(
    "panelListado"
  ).style.display = "none";

  document.getElementById(
    "panelVisita"
  ).style.display = "none";

  document.getElementById(
    "panelClientesCercanos"
  ).style.display = "none";

  document.getElementById(
    "panelHistorial"
  ).style.display = "block";
}

    alert(
      "No hay una visita abierta para cerrar."
    );

    return;
  }

  const evento = {
    tipo: "salida_visita",
    payload: {
      visita_id:
        visitaActualId,

      latitud:
        ubicacionActual
          ? ubicacionActual.lat
          : null,

      longitud:
        ubicacionActual
          ? ubicacionActual.lng
          : null
    }
  };

  try {
    if (!navigator.onLine) {
      throw new Error("Offline");
    }

    const respuesta =
      await enviarEvento(evento);

    const datos =
      await respuesta.json();

    if (!respuesta.ok) {
      alert(
        datos.error ||
        datos.detalle ||
        "No se pudo cerrar la visita"
      );

      return;
    }

  } catch (error) {
    console.error(
      "Error cerrando visita:",
      error
    );

    agregarAColaOffline(evento);

    alert(
      "Sin conexión. La salida quedó " +
      "guardada para sincronizar."
    );
  }

  document.getElementById(
    "panelVisita"
  ).style.display = "none";

  visitaActualId = null;

  seleccionandoClienteCercano =
    false;

  document.getElementById(
    "panelClientesCercanos"
  ).style.display = "none";

  activarAlgoritmoProximoCliente();

  await sincronizarOffline();
  await cargarDatos(false);
}

function centrarMapa() {
  cerrarPanelListado();
  cerrarPanelVisitas();
  cerrarClientesCercanos();

  if (ubicacionActual) {
    mapa.setView(
      [
        ubicacionActual.lat,
        ubicacionActual.lng
      ],
      17
    );
  }
}

async function cerrarSesion() {
  const confirmar = window.confirm(
    "¿Querés cerrar la sesión y finalizar la jornada?"
  );

  if (!confirmar) {
    return;
  }

  try {
    await sincronizarOffline();
  } catch (error) {
    console.error(
      "No se pudo sincronizar antes de cerrar sesión:",
      error
    );
  }

  try {
    const respuesta = await fetch(
      `${API}/usuarios/${vendedorId}/cerrar-sesion`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          latitud: ubicacionActual
            ? ubicacionActual.lat
            : null,
          longitud: ubicacionActual
            ? ubicacionActual.lng
            : null
        }),
        keepalive: true
      }
    );

    const datos = await respuesta.json();

    if (!respuesta.ok) {
      throw new Error(
        datos.error ||
        datos.detalle ||
        "No se pudo cerrar la sesión en el servidor"
      );
    }

  } catch (error) {
    console.error(
      "Error cerrando sesión en el servidor:",
      error
    );

    alert(
      "Se cerrará la aplicación, pero SEC no pudo registrar el cierre de sesión. " +
      "El vendedor desaparecerá del mapa automáticamente si deja de enviar GPS."
    );
  }

  localStorage.removeItem("vendedorId");
  localStorage.removeItem("vendedorNombre");
  localStorage.removeItem("sesionVendedorId");
  localStorage.removeItem("inicioSesionVendedor");

  window.location.href = "login-vendedor.html";
}

/*
=================================
INICIAR APLICACIÓN
=================================
*/

actualizarEstadoConexion();
iniciarMapa();
cargarDatos(true);
iniciarGPS();

setInterval(
  sincronizarOffline,
  30000
);

setInterval(
  () => cargarDatos(false),
  180000
);
</script>
