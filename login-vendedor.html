<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SEC - Login Vendedor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header-sec">
  <img src="assets/logo-rebesa.jpg" alt="Rebesa" class="logo-rebesa">

  <div>
    <h1>SEC Vendedor</h1>
    <p>Ingreso al sistema</p>
  </div>
</header>

<div class="container">

  <h2>Ingresar</h2>

  <input
    id="legajo"
    type="text"
    placeholder="Ingrese su legajo"
    style="width:100%;padding:15px;font-size:18px;"
  >

  <br><br>

  <button
    onclick="ingresar()"
    style="width:100%;padding:18px;font-size:20px;"
  >
    Ingresar
  </button>

  <br><br>

  <p id="mensaje"></p>

</div>

<script>

const API = "https://sec-backend-gg4j.onrender.com";

async function obtenerUbicacion() {
  return new Promise((resolve) => {

    if (!navigator.geolocation) {
      resolve(null);
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        resolve({
          latitud: pos.coords.latitude,
          longitud: pos.coords.longitude
        });
      },
      () => resolve(null),
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 60000
      }
    );
  });
}

async function ingresar() {

  try {

    const legajo =
      document.getElementById("legajo").value.trim();

    if (!legajo) {
      document.getElementById("mensaje").textContent =
        "Ingrese un legajo";
      return;
    }

    const usuarios =
      await fetch(`${API}/usuarios`)
      .then(r => r.json());

    const vendedor =
      usuarios.find(u =>
        String(u.legajo || "") === String(legajo)
        &&
        u.rol === "VENDEDOR"
      );

    if (!vendedor) {
      document.getElementById("mensaje").textContent =
        "Legajo no encontrado";
      return;
    }

    /*
    ===============================
    GUARDAR LOGIN
    ===============================
    */

    localStorage.setItem(
      "vendedorId",
      vendedor.id
    );

    localStorage.setItem(
      "vendedorNombre",
      vendedor.nombre + " " + vendedor.apellido
    );

    /*
    ===============================
    ALERTA DE LOGIN
    ===============================
    */

    try {

      const gps =
        await obtenerUbicacion();

      await fetch(`${API}/alertas`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          vendedor_id: vendedor.id,
          tipo: "LOGIN",
          prioridad: "BAJA",
          descripcion:
            `${vendedor.nombre} ${vendedor.apellido} inició sesión`,
          latitud: gps?.latitud || null,
          longitud: gps?.longitud || null
        })
      });

    } catch (e) {
      console.log(
        "No se pudo registrar alerta de login"
      );
    }

    window.location.href =
      "vendedor.html";

  }
  catch (error) {

    console.error(error);

    document.getElementById("mensaje").textContent =
      "Error al conectar con el servidor";
  }

}

</script>
