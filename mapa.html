<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SEC - Mapa Inteligente</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #mapa { height: calc(100vh - 150px); width: 100%; }
  </style>
</head>
<body>

<header class="header-sec">
  <img src="assets/logo-rebesa.jpg" alt="Rebesa" class="logo-rebesa">
  <div>
    <h1>SEC - Mapa Inteligente</h1>
    <p>Sistema de Ejecución Comercial</p>
  </div>
</header>

<nav>
  <a href="index.html">Dashboard</a>
  <a href="mapa.html">Mapa</a>
  <a href="clientes.html">Clientes</a>
  <a href="usuarios.html">Usuarios</a>
  <a href="importar-clientes.html">📥 Importar Excel</a>
  <a href="visitas.html">Visitas</a>
  <a href="alertas.html">Alertas</a>
  <a href="cobertura.html">Cobertura</a>
  <a href="pendientes.html">Pendientes</a>
  <a href="dashboard-vendedores.html">Vendedores</a>
</nav>

<div class="cards">
  <div class="card">
    <h3>🟢 Visitados</h3>
    <p id="totalVisitados">0</p>
  </div>

  <div class="card">
    <h3>🟠 Pendientes</h3>
    <p id="totalPendientes">0</p>
  </div>

  <div class="card">
    <h3>⚪ No Programados</h3>
    <p id="totalNoProgramados">0</p>
  </div>

  <div class="card">
    <h3>🔴 GPS Activos</h3>
    <p id="totalGps">0</p>
  </div>
</div>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const API = "https://sec-backend-gg4j.onrender.com";

const mapa = L.map("mapa").setView([-34.7073, -58.6757], 13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(mapa);

let capaMapa = L.layerGroup().addTo(mapa);

function coordenadaValida(lat, lng) {
  return (
    !isNaN(lat) &&
    !isNaN(lng) &&
    lat !== 0 &&
    lng !== 0 &&
    lat > -40 &&
    lat < -30 &&
    lng > -65 &&
    lng < -55
  );
}

function colorEstado(estado) {
  if (estado === "VISITADO") return "green";
  if (estado === "PENDIENTE") return "orange";
  return "gray";
}

async function cargarMapa() {
  try {
    capaMapa.clearLayers();

    const clientes = await fetch(`${API}/mapa/clientes-estado`).then(r => r.json());
    const gpsLogs = await fetch(`${API}/gps-logs/ultimos`).then(r => r.json());

    const visitados = clientes.filter(c => c.estado === "VISITADO").length;
    const pendientes = clientes.filter(c => c.estado === "PENDIENTE").length;
    const noProgramados = clientes.filter(c => c.estado === "NO_PROGRAMADO").length;

    document.getElementById("totalVisitados").textContent = visitados;
    document.getElementById("totalPendientes").textContent = pendientes;
    document.getElementById("totalNoProgramados").textContent = noProgramados;
    document.getElementById("totalGps").textContent = gpsLogs.length;

    const puntos = [];

    clientes.forEach(c => {
      const lat = Number(c.latitud);
      const lng = Number(c.longitud);

      if (!coordenadaValida(lat, lng)) return;

      if (c.estado === "PENDIENTE" || c.estado === "VISITADO") {
        puntos.push([lat, lng]);
      }

      const color = colorEstado(c.estado);

      L.circleMarker([lat, lng], {
        radius: 12,
        color: color,
        fillColor: color,
        fillOpacity: 0.9
      })
      .addTo(capaMapa)
      .bindPopup(`
        <b>${c.nombre || ""}</b><br>
        Código: ${c.codigo_cliente || ""}<br>
        Dirección: ${c.direccion || ""}<br>
        Localidad: ${c.localidad || ""}<br>
        Canal: ${c.canal || ""}<br>
        Frecuencia: ${c.frecuencia || ""}<br>
        Estado: <b>${c.estado || ""}</b>
      `);
    });

    gpsLogs.forEach(g => {
      const lat = Number(g.latitud);
      const lng = Number(g.longitud);

      if (!coordenadaValida(lat, lng)) return;

      puntos.push([lat, lng]);

      L.circleMarker([lat, lng], {
        radius: 16,
        color: "red",
        fillColor: "red",
        fillOpacity: 1
      })
      .addTo(capaMapa)
      .bindPopup(`
        <b>GPS Vendedor</b><br>
        Vendedor: ${g.vendedor || g.vendedor_id || ""}<br>
        Fecha: ${g.fecha_hora || ""}<br>
        Velocidad: ${g.velocidad || 0}
      `);
    });

    if (puntos.length > 0) {
      mapa.fitBounds(puntos, {
        padding: [60, 60],
        maxZoom: 17
      });
    } else {
      mapa.setView([-34.7073, -58.6757], 13);
    }

  } catch (error) {
    console.error(error);
    alert("Error al cargar mapa: " + error.message);
  }
}

cargarMapa();
setInterval(cargarMapa, 30000);
</script>

</body>
</html>
